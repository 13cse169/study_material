<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReactMaster — Learn React Step by Step</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* === CSS Variables === */
    :root {
      --bg: #0d0e14;
      --bg2: #13141d;
      --bg3: #1a1c28;
      --bg4: #212338;
      --border: rgba(120, 130, 220, 0.12);
      --accent: #7c6ff7;
      --accent2: #5bc9a0;
      --accent3: #f0965a;
      --accent4: #e85d75;
      --text: #e8eaf5;
      --text2: #9398bb;
      --text3: #5c6091;
      --code-bg: #0a0b11;
      --sidebar-w: 280px;
      --header-h: 58px;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .light {
      --bg: #f5f6ff;
      --bg2: #ffffff;
      --bg3: #eceef8;
      --bg4: #e0e3f5;
      --border: rgba(80, 90, 180, 0.14);
      --accent: #5a4fd6;
      --accent2: #1a9e73;
      --accent3: #d4700a;
      --accent4: #c93050;
      --text: #1a1d3a;
      --text2: #4a5080;
      --text3: #8890c0;
      --code-bg: #1a1c28;
      --shadow: 0 4px 24px rgba(80,80,180,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    h1,h2,h3,h4 { font-family: 'Fraunces', serif; font-weight: 700; }

    /* === LAYOUT === */
    #app { display: flex; height: 100vh; overflow: hidden; }

    /* === HEADER === */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: var(--header-h);
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 20px; gap: 16px;
    }
    #header .logo {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Fraunces', serif; font-size: 1.25rem;
      font-weight: 700; color: var(--accent); white-space: nowrap;
    }
    #header .logo span { font-style: italic; color: var(--accent2); }
    #search-wrap {
      flex: 1; max-width: 380px; position: relative;
    }
    #search-input {
      width: 100%; padding: 8px 14px 8px 36px;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.875rem;
      outline: none; transition: border-color 0.2s;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--text3); }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 0.9rem; }
    #header .header-actions { display: flex; align-items: center; gap: 12px; margin-left: auto; }
    .theme-btn {
      padding: 6px 12px; border-radius: 8px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; font-size: 0.9rem;
      transition: all 0.2s;
    }
    .theme-btn:hover { background: var(--bg4); border-color: var(--accent); }
    .progress-badge {
      padding: 5px 12px; border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; font-size: 0.75rem; font-weight: 600;
    }

    /* === SIDEBAR === */
    #sidebar {
      position: fixed; top: var(--header-h); left: 0; bottom: 0;
      width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      overflow-y: auto; padding: 16px 12px;
      transition: transform 0.3s;
      z-index: 90;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }
    .cat-label {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text3);
      padding: 12px 8px 6px; margin-top: 6px;
    }
    .topic-btn {
      display: flex; align-items: center; gap: 10px; width: 100%;
      padding: 9px 12px; border-radius: 8px; border: none;
      background: transparent; color: var(--text2);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.875rem;
      cursor: pointer; text-align: left;
      transition: all 0.15s; position: relative;
    }
    .topic-btn:hover { background: var(--bg3); color: var(--text); }
    .topic-btn.active {
      background: linear-gradient(135deg, rgba(124,111,247,0.2), rgba(91,201,160,0.1));
      color: var(--text);
      border: 1px solid rgba(124,111,247,0.3);
    }
    .topic-btn .icon { font-size: 1rem; flex-shrink: 0; }
    .topic-btn .done-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent2); margin-left: auto; flex-shrink: 0;
    }
    .sidebar-footer {
      padding: 16px 8px; border-top: 1px solid var(--border); margin-top: 16px;
    }
    .sidebar-nav-btn {
      display: flex; align-items: center; gap: 8px; width: 100%;
      padding: 9px 12px; border-radius: 8px; border: none;
      background: transparent; color: var(--text2);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.875rem;
      cursor: pointer; text-align: left; transition: all 0.15s;
    }
    .sidebar-nav-btn:hover { background: var(--bg3); color: var(--text); }
    .sidebar-nav-btn.active { color: var(--accent); font-weight: 600; }

    /* === MAIN CONTENT === */
    #main {
      margin-left: var(--sidebar-w);
      margin-top: var(--header-h);
      flex: 1; overflow-y: auto; padding: 32px;
      background: var(--bg);
    }
    #main::-webkit-scrollbar { width: 6px; }
    #main::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

    /* === SEARCH RESULTS === */
    .search-results { padding: 0; }
    .search-results h2 { margin-bottom: 20px; font-size: 1.5rem; }
    .search-result-item {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 18px; border-radius: var(--radius);
      background: var(--bg2); border: 1px solid var(--border);
      cursor: pointer; margin-bottom: 10px; transition: all 0.2s;
    }
    .search-result-item:hover { border-color: var(--accent); transform: translateX(4px); }
    .search-result-item .ri { font-size: 1.4rem; }
    .search-result-item h4 { margin-bottom: 2px; }
    .search-result-item p { font-size: 0.8rem; color: var(--text2); }

    /* === HOME PAGE === */
    .home-hero {
      text-align: center; padding: 48px 0 40px;
    }
    .home-hero h1 { font-size: 3.2rem; line-height: 1.1; margin-bottom: 16px; }
    .home-hero h1 .acc { color: var(--accent); font-style: italic; }
    .home-hero h1 .acc2 { color: var(--accent2); }
    .home-hero p { font-size: 1.1rem; color: var(--text2); max-width: 560px; margin: 0 auto 32px; }
    .home-hero .cta-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      padding: 12px 28px; border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), #9d6ef7);
      color: white; border: none; font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,111,247,0.4); }
    .btn-secondary {
      padding: 12px 28px; border-radius: 10px;
      background: var(--bg3); color: var(--text); border: 1px solid var(--border);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { background: var(--bg4); border-color: var(--accent); }

    /* Stats */
    .stats-row {
      display: flex; gap: 16px; justify-content: center; margin: 32px 0; flex-wrap: wrap;
    }
    .stat-card {
      padding: 20px 28px; border-radius: var(--radius);
      background: var(--bg2); border: 1px solid var(--border);
      text-align: center; min-width: 120px;
    }
    .stat-card .num {
      font-family: 'Fraunces', serif; font-size: 2.2rem; font-weight: 700;
      color: var(--accent); line-height: 1;
    }
    .stat-card .lbl { font-size: 0.75rem; color: var(--text2); margin-top: 6px; }

    /* Topic cards grid */
    .section-title { font-size: 1.4rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .topics-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }
    .topic-card {
      padding: 20px; border-radius: var(--radius);
      background: var(--bg2); border: 1px solid var(--border);
      cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
    }
    .topic-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      opacity: 0; transition: opacity 0.25s;
    }
    .topic-card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: var(--shadow); }
    .topic-card:hover::before { opacity: 0.06; }
    .topic-card .card-icon { font-size: 1.8rem; margin-bottom: 10px; }
    .topic-card h3 { font-size: 1rem; margin-bottom: 6px; position: relative; }
    .topic-card p { font-size: 0.8rem; color: var(--text2); position: relative; line-height: 1.5; }
    .topic-card .cat-tag {
      display: inline-block; padding: 3px 8px; border-radius: 4px;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em;
      background: var(--bg4); color: var(--text2); margin-bottom: 10px;
      position: relative;
    }
    .topic-card .completed-badge {
      position: absolute; top: 12px; right: 12px;
      background: var(--accent2); color: white;
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
    }

    /* === TOPIC LESSON PAGE === */
    .lesson-header {
      display: flex; align-items: flex-start; gap: 16px;
      padding: 28px 32px;
      background: var(--bg2); border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .lesson-icon { font-size: 2.8rem; flex-shrink: 0; }
    .lesson-header h1 { font-size: 2rem; margin-bottom: 8px; }
    .lesson-header p { color: var(--text2); font-size: 0.95rem; }
    .lesson-header .header-meta { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    .meta-tag {
      padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
    }
    .meta-tag.cat { background: rgba(124,111,247,0.15); color: var(--accent); }
    .meta-tag.qs { background: rgba(91,201,160,0.15); color: var(--accent2); }

    .mark-btn {
      padding: 10px 20px; border-radius: 8px; border: 1px solid var(--accent2);
      background: transparent; color: var(--accent2);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.875rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; margin-left: auto; white-space: nowrap;
    }
    .mark-btn.done { background: var(--accent2); color: white; }
    .mark-btn:hover { background: var(--accent2); color: white; }

    /* Tabs */
    .tab-bar {
      display: flex; gap: 4px; margin-bottom: 24px;
      background: var(--bg2); padding: 4px; border-radius: 10px;
      border: 1px solid var(--border); overflow-x: auto;
    }
    .tab-btn {
      padding: 8px 16px; border-radius: 7px; border: none;
      background: transparent; color: var(--text2);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.85rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .tab-btn.active {
      background: var(--accent); color: white;
    }
    .tab-btn:hover:not(.active) { background: var(--bg3); color: var(--text); }

    /* Content sections */
    .content-section {
      background: var(--bg2); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 28px;
      margin-bottom: 20px;
    }
    .content-section h2 { font-size: 1.25rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .content-section p { color: var(--text2); line-height: 1.75; margin-bottom: 12px; }
    .content-section strong { color: var(--text); }

    /* Explanation formatting */
    .explanation {
      color: var(--text2); line-height: 1.8; font-size: 0.95rem;
    }
    .explanation strong { color: var(--accent2); font-weight: 600; }

    /* Step list */
    .step-list { list-style: none; }
    .step-list li {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .step-list li:last-child { border-bottom: none; }
    .step-num {
      width: 26px; height: 26px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; font-size: 0.75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .step-list li p { color: var(--text2); font-size: 0.9rem; line-height: 1.6; margin: 0; }

    /* Mistakes list */
    .mistake-list { list-style: none; }
    .mistake-list li {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 14px; border-radius: 8px;
      background: rgba(232,93,117,0.08); margin-bottom: 8px;
      border-left: 3px solid var(--accent4);
    }
    .mistake-list li::before { content: '⚠️'; flex-shrink: 0; }
    .mistake-list li p { color: var(--text2); font-size: 0.875rem; line-height: 1.5; margin: 0; }

    /* Code block */
    .code-block {
      background: var(--code-bg); border-radius: 10px;
      border: 1px solid var(--border); overflow: hidden;
    }
    .code-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: rgba(255,255,255,0.03);
      border-bottom: 1px solid var(--border);
    }
    .code-header span { font-size: 0.8rem; color: var(--text3); font-family: 'DM Mono', monospace; }
    .copy-btn {
      padding: 4px 10px; border-radius: 6px;
      background: var(--bg4); border: 1px solid var(--border);
      color: var(--text2); font-size: 0.75rem; cursor: pointer; transition: all 0.2s;
    }
    .copy-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
    .code-block pre {
      padding: 20px; overflow-x: auto; font-family: 'DM Mono', monospace;
      font-size: 0.82rem; line-height: 1.65; color: #abb2bf;
    }
    .code-block pre::-webkit-scrollbar { height: 4px; }
    .code-block pre::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }

    /* Syntax highlighting (simple) */
    .kw { color: #c678dd; }
    .fn { color: #61afef; }
    .str { color: #98c379; }
    .cm { color: #5c6370; font-style: italic; }
    .num { color: #d19a66; }
    .tag { color: #e06c75; }
    .attr { color: #d19a66; }

    /* Interview Q&A */
    .qa-list { list-style: none; }
    .qa-item {
      border-radius: 10px; border: 1px solid var(--border);
      overflow: hidden; margin-bottom: 10px;
      background: var(--bg2);
    }
    .qa-question {
      padding: 14px 18px; cursor: pointer;
      display: flex; align-items: flex-start; gap: 12px;
      transition: background 0.15s;
    }
    .qa-question:hover { background: var(--bg3); }
    .qa-q-icon {
      width: 22px; height: 22px; border-radius: 6px;
      background: rgba(124,111,247,0.2); color: var(--accent);
      font-size: 0.7rem; font-weight: 800; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; margin-top: 1px;
    }
    .qa-question p { color: var(--text); font-weight: 500; font-size: 0.9rem; line-height: 1.5; }
    .qa-chevron { margin-left: auto; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
    .qa-item.open .qa-chevron { transform: rotate(180deg); }
    .qa-answer {
      display: none; padding: 14px 18px 18px;
      border-top: 1px solid var(--border); background: rgba(124,111,247,0.04);
    }
    .qa-item.open .qa-answer { display: block; }
    .qa-answer p { color: var(--text2); font-size: 0.875rem; line-height: 1.75; margin: 0; }

    /* Prev/Next nav */
    .lesson-nav {
      display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap;
    }
    .nav-btn {
      flex: 1; min-width: 160px; padding: 14px 20px; border-radius: var(--radius);
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; transition: all 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.875rem;
    }
    .nav-btn:hover { border-color: var(--accent); background: var(--bg3); }
    .nav-btn .nav-label { color: var(--text3); font-size: 0.75rem; margin-bottom: 4px; }
    .nav-btn .nav-title { font-weight: 600; }
    .nav-btn.next { text-align: right; }

    /* === API DEMO PAGE === */
    .api-page {}
    .api-page h2 { font-size: 1.8rem; margin-bottom: 8px; }
    .api-page > p { color: var(--text2); margin-bottom: 24px; }
    .api-controls {
      display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
      align-items: center;
    }
    .api-controls input, .api-controls select {
      padding: 8px 14px; border-radius: 8px;
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.875rem; outline: none; transition: border-color 0.2s;
    }
    .api-controls input:focus, .api-controls select:focus { border-color: var(--accent); }
    .api-controls input { flex: 1; min-width: 180px; }
    .btn-fetch {
      padding: 8px 18px; border-radius: 8px;
      background: var(--accent); border: none; color: white;
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.875rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-fetch:hover { background: #9d8ef7; }

    .loading-state {
      display: flex; flex-direction: column; align-items: center;
      gap: 16px; padding: 60px; color: var(--text2);
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--bg4);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state {
      padding: 32px; text-align: center; color: var(--accent4);
      background: rgba(232,93,117,0.08); border-radius: var(--radius);
      border: 1px solid rgba(232,93,117,0.2);
    }
    .error-state p { font-size: 1.1rem; margin-bottom: 12px; }
    .error-state button {
      padding: 8px 18px; border-radius: 8px; border: 1px solid var(--accent4);
      background: transparent; color: var(--accent4); cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.875rem;
      transition: all 0.2s;
    }
    .error-state button:hover { background: var(--accent4); color: white; }

    .posts-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }
    .post-card {
      padding: 18px 20px; border-radius: var(--radius);
      background: var(--bg2); border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .post-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .post-card .post-id {
      font-size: 0.7rem; color: var(--accent); font-family: 'DM Mono', monospace;
      font-weight: 600; margin-bottom: 8px; display: block;
    }
    .post-card h4 { font-size: 0.9rem; margin-bottom: 8px; line-height: 1.4; text-transform: capitalize; }
    .post-card p { font-size: 0.8rem; color: var(--text2); line-height: 1.6; }

    .pagination {
      display: flex; align-items: center; gap: 12px;
      justify-content: center; margin-top: 24px;
    }
    .pagination button {
      padding: 8px 16px; border-radius: 8px;
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; font-size: 0.875rem;
      font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s;
    }
    .pagination button:hover:not(:disabled) { border-color: var(--accent); background: var(--bg3); }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .pagination span { color: var(--text2); font-size: 0.875rem; }

    /* Users Tab */
    .users-table-wrap { overflow-x: auto; }
    .users-table {
      width: 100%; border-collapse: collapse; font-size: 0.875rem;
    }
    .users-table th {
      padding: 10px 14px; text-align: left; background: var(--bg3);
      color: var(--text2); font-weight: 600; font-size: 0.8rem;
      text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }
    .users-table td {
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      color: var(--text2); vertical-align: middle;
    }
    .users-table tr:last-child td { border-bottom: none; }
    .users-table tr:hover td { background: var(--bg3); color: var(--text); }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;

    steps:["Install Node.js and npm on your machine","Run `npx create-react-app my-app` to scaffold a new project","Navigate to the project: `cd my-app`","Start dev server: `npm start`","Open http://localhost:3000 in your browser","Edit `src/App.js` and see live changes"],
    mistakes:["Trying to use React without understanding JavaScript fundamentals first","Not understanding the difference between React and React DOM","Modifying the DOM directly instead of letting React handle it","Forgetting to return JSX from components"],
    qa:[
      {q:"What is React and why would you use it?",a:"React is a JavaScript library for building user interfaces. It uses a component-based architecture, virtual DOM for performance, and declarative syntax to make UIs predictable and easier to debug. Use it when building complex, interactive UIs that need to update frequently."},
      {q:"What is the Virtual DOM and how does it improve performance?",a:"The Virtual DOM is a lightweight JavaScript representation of the real DOM. When state changes, React creates a new Virtual DOM tree, diffs it against the previous one (reconciliation), and only updates changed parts in the real DOM. This batching is much faster than direct DOM manipulation."},
      {q:"What's the difference between a library and a framework?",a:"A library (like React) provides tools you call when needed — you control the flow. A framework (like Angular) provides a structure that calls your code — it controls the flow (Inversion of Control). React is a library; Angular is a framework."},
      {q:"What is reconciliation in React?",a:"Reconciliation is React's process of comparing the new Virtual DOM with the previous one to determine what changed. React uses a diffing algorithm that assumes elements of different types produce different trees, and uses `key` props to identify stable elements across renders."},
      {q:"What is create-react-app and what does it set up?",a:"create-react-app scaffolds a React project with Webpack, Babel for JSX/ES6+, ESLint, Jest, a dev server with hot reloading, and production build optimization — all with zero configuration."}

  {
    id:"jsx", title:"JSX", icon:"📝", category:"Fundamentals",
    description:"JavaScript XML syntax — writing HTML in JavaScript",
    explanation:`JSX (JavaScript XML) is a syntax extension for JavaScript that lets you write HTML-like markup inside JavaScript. It's not required but makes React code much more readable.\n\n<strong>Key Rules:</strong>\n• Return a single root element (or use Fragment &lt;&gt;&lt;/&gt;)\n• Close all tags (including self-closing like &lt;img /&gt;)\n• Use className instead of class\n• Use htmlFor instead of for\n• JavaScript expressions go in curly braces {}\n• camelCase for HTML attributes (onClick, tabIndex)`,
    codeExample:`// JSX fundamentals
function JSXDemo() {
  const name = "React Developer";
  const isLoggedIn = true;
  const items = ["Apple", "Banana", "Cherry"];

  return (
    <div className="container">
      {/* Comment in JSX */}
      <h1>Hello, {name}!</h1>

      {/* Conditional rendering */}
      {isLoggedIn ? <p>Welcome back!</p> : <p>Please log in</p>}
      {isLoggedIn && <button>Logout</button>}

      {/* Rendering a list — key is required! */}
      <ul>
        {items.map((item, index) => (
          <li key={index}>{item}</li>
        ))}
      </ul>

      {/* Inline styles (double curly braces) */}
      <p style={{ color: 'blue', fontSize: '18px' }}>Styled</p>

      {/* Self-closing tags must be closed */}
      <input type="text" placeholder="Enter text" />
      <img src="photo.jpg" alt="description" />
    </div>
  );
}`,
    steps:["Understand JSX compiles to React.createElement() calls","Always return one root element from a component","Use {} to embed JavaScript expressions in JSX","Replace class with className and for with htmlFor","Map arrays with .map() providing unique key props","Use ternary or && for conditional rendering"],
    mistakes:["Returning multiple root elements without a Fragment","Using `class` instead of `className`","Forgetting to add `key` prop when rendering lists","Using statements (if/for) instead of expressions inside JSX","Forgetting to close self-closing tags"],
    qa:[
      {q:"What is JSX and is it required in React?",a:"JSX is a syntax extension that looks like HTML but compiles to React.createElement() calls. It's not required — you could write React.createElement() directly — but JSX makes code much more readable and maintainable."},
      {q:"Why do we use className instead of class in JSX?",a:"Because JSX is JavaScript, and `class` is a reserved keyword in JavaScript (used for ES6 classes). React uses `className` to avoid the conflict. During compilation, `className` maps to the HTML `class` attribute."},
      {q:"What is a React Fragment and when would you use it?",a:"A Fragment (<React.Fragment> or shorthand <>) lets you group multiple elements without adding an extra DOM node. Use it when a component needs to return multiple elements but you don't want an unnecessary wrapper div breaking CSS layouts."},
      {q:"How does JSX prevent XSS attacks?",a:"React DOM escapes any values embedded in JSX before rendering. Everything is converted to a string, so you can never inject HTML through JSX expressions. This makes it safe to include user-provided content."},
      {q:"What is the difference between {expression} and string in JSX?",a:"Curly braces {} evaluate JavaScript expressions and can contain variables, function calls, ternary operators, etc. String literals in JSX props can be written as attribute='value'. For dynamic values, always use curly braces."}
    ]
  },
  {
    id:"components", title:"Components", icon:"🧩", category:"Fundamentals",
    description:"Functional & Class components — the building blocks of React",
    explanation:`Components are independent, reusable pieces of UI. Think of them like JavaScript functions that accept inputs (props) and return React elements.\n\n<strong>Functional Components (Modern — Preferred)</strong>\n• Regular JavaScript functions\n• Use hooks for state and lifecycle\n• Cleaner, less boilerplate\n• Easier to test\n\n<strong>Class Components (Legacy)</strong>\n• ES6 classes extending React.Component\n• Use this.state and lifecycle methods\n• Still work but hooks replaced most use cases`,
    codeExample:`// ✅ Functional Component (Modern)
import React, { useState } from 'react';

function Counter({ initialCount = 0, label = "Count" }) {
  const [count, setCount] = useState(initialCount);

  return (
    <div className="counter">
      <h2>{label}: {count}</h2>
      <button onClick={() => setCount(c => c + 1)}>+</button>
      <button onClick={() => setCount(c => c - 1)}>-</button>
      <button onClick={() => setCount(initialCount)}>Reset</button>
    </div>
  );
}

// ⚠️ Class Component (Legacy — still valid)
class CounterClass extends React.Component {
  constructor(props) {
    super(props);
    this.state = { count: props.initialCount || 0 };
  }

  render() {
    return (
      <div className="counter">
        <h2>{this.props.label}: {this.state.count}</h2>
        <button onClick={() => this.setState(s => ({count: s.count+1}))}>
          +
        </button>
      </div>
    );
  }
}

// Component composition
function App() {
  return (
    <div>
      <Counter label="Likes" initialCount={10} />
      <Counter label="Views" initialCount={100} />
    </div>
  );
}`,
    steps:["Create a function with a capitalized name (PascalCase)","Return JSX describing what the component renders","Export with `export default ComponentName`","Import and use with JSX: `<ComponentName />`","Pass data to components via props","Compose components by nesting them"],
    mistakes:["Using lowercase component names (React treats lowercase as HTML)","Calling hooks inside class components","Mutating state directly instead of using setState","Not understanding that components re-render when state/props change"],
    qa:[
      {q:"What is the difference between functional and class components?",a:"Functional components are plain JavaScript functions that return JSX and use hooks for state/lifecycle. Class components extend React.Component, use this.state, and have lifecycle methods. Functional components are preferred since React 16.8 introduced hooks."},
      {q:"What is a Pure Component?",a:"A Pure Component (React.PureComponent) only re-renders when props or state actually change, using a shallow comparison. It's the class component equivalent of React.memo for functional components. Use it to optimize performance by preventing unnecessary renders."},
      {q:"What are controlled vs uncontrolled components?",a:"Controlled components have form data managed by React state. Uncontrolled components store data in the DOM itself (accessed via refs). Controlled components are preferred as they give React full control and make validation/transformation easier."},
      {q:"What is component composition?",a:"Composition is using components inside other components to build complex UIs from simple pieces. React encourages composition over inheritance. Instead of extending components, you include them as children or props. The `children` prop is key to flexible composition."},
      {q:"When would you still use a class component?",a:"Rarely in modern React. One case is Error Boundaries — they currently can only be class components (using componentDidCatch and getDerivedStateFromError). Otherwise, functional components with hooks handle all use cases better."}
    ]

  {
    id:"props-state", title:"Props & State", icon:"🔄", category:"Fundamentals",
    description:"How data flows in React — props down, events up",
    explanation:`<strong>Props (Properties)</strong>\n• Data passed from parent to child\n• Read-only — child cannot modify props\n• Can be any JavaScript value\n• Enable component reusability\n\n<strong>State</strong>\n• Data managed inside a component\n• Can change over time (triggers re-render)\n• Private to the component\n• Updated with useState setter\n\n<strong>The Golden Rule:</strong> Data flows DOWN (props), events flow UP (callbacks)`,
    codeExample:`// Props and State complete example
import React, { useState } from 'react';

// Child — receives props (read-only)
function ProductCard({ name, price, onAddToCart }) {
  return (
    <div className="product-card">
      <h3>{name}</h3>
      <p>\${price.toFixed(2)}</p>
      {/* Calling parent's function via prop */}
      <button onClick={() => onAddToCart({ name, price })}>
        Add to Cart
      </button>
    </div>
  );
}

// Parent — owns state
function ShoppingApp() {
  const [cart, setCart] = useState([]);

  const handleAddToCart = (product) => {
    setCart(prev => [...prev, product]);
  };

  const products = [
    { id: 1, name: 'React Book', price: 29.99 },
    { id: 2, name: 'Keyboard', price: 79.99 },
  ];

  const total = cart.reduce((sum, item) => sum + item.price, 0);

  return (
    <div>
      {products.map(product => (
        <ProductCard
          key={product.id}
          name={product.name}
          price={product.price}
          onAddToCart={handleAddToCart}
        />
      ))}
      <p>Cart: {cart.length} items | Total: \${total.toFixed(2)}</p>
    </div>
  );
}`,
    steps:["Define props as the first parameter of your function","Use destructuring to extract individual props","Pass props to children like HTML attributes","Use useState() for data that changes over time","Never mutate state directly — use the setter function","Pass callbacks as props for children to communicate upward"],
    mistakes:["Mutating state directly: `state.items.push(item)` — use spread","Forgetting that state updates are asynchronous","Not lifting state up when siblings need to share data","Passing too many individual props — consider an object"],
    qa:[
      {q:"What is the difference between props and state?",a:"Props are read-only inputs passed from parent to child — the child can't modify them. State is mutable data managed inside a component that triggers re-renders when changed. Props enable reuse; state enables interactivity."},
      {q:"Why should state updates be immutable?",a:"React uses shallow comparison to detect state changes. If you mutate state directly, the reference doesn't change, so React doesn't re-render. Always create new objects/arrays: use spread operator, Object.assign(), or Array methods that return new arrays."},
      {q:"What is 'lifting state up'?",a:"When two sibling components need to share state, you move (lift) that state to their closest common ancestor. The parent holds the state and passes it down to both siblings as props, and passes updater functions for them to call."},
      {q:"What is prop drilling and how do you solve it?",a:"Prop drilling is passing props through intermediate components that don't use them. Solutions: React Context API (for global/shared state), state management libraries (Redux, Zustand), or component composition."},
      {q:"Can a component update its own props?",a:"No. Props are read-only from the component's perspective. Only the parent can change them. If a component needs to change a value, it should be in state or the parent should pass a callback function."}
    ]
  },
  {
    id:"events", title:"Event Handling", icon:"🖱️", category:"Fundamentals",
    description:"Handling user interactions — clicks, inputs, forms, and more",
    explanation:`React events are similar to DOM events but with differences:\n• Use camelCase: onClick not onclick\n• Pass a function reference: onClick={fn} not onClick="fn()"\n• Call e.preventDefault() to prevent default browser behavior\n• Synthetic Events: React wraps native events in a cross-browser wrapper\n\n<strong>Common Events:</strong> onClick, onChange, onSubmit, onKeyDown, onFocus, onBlur, onMouseEnter, onMouseLeave`,
    codeExample:`import React, { useState } from 'react';

function EventDemo() {
  const [text, setText] = useState('');
  const [log, setLog] = useState([]);

  const addLog = (msg) => setLog(prev => [msg, ...prev.slice(0, 4)]);

  // Click handler
  const handleClick = (e) => {
    addLog(\`Clicked! \${e.target.textContent}\`);
  };

  // Controlled input handler
  const handleChange = (e) => {
    setText(e.target.value);
  };

  // Keyboard handler
  const handleKeyDown = (e) => {
    if (e.key === 'Enter') addLog('Enter pressed!');
    if (e.key === 'Escape') setText('');
  };

  // Form submit — prevent default!
  const handleSubmit = (e) => {
    e.preventDefault();
    if (text.trim()) {
      addLog(\`Submitted: "\${text}"\`);
      setText('');
    }
  };

  return (
    <div>
      {/* Different ways to attach handlers */}
      <button onClick={handleClick}>Click Me</button>
      <button onClick={() => addLog('Custom arg!')}>
        With Argument
      </button>

      <form onSubmit={handleSubmit}>
        <input
          value={text}
          onChange={handleChange}
          onKeyDown={handleKeyDown}
          placeholder="Type and press Enter..."
        />
        <button type="submit">Submit</button>
      </form>

      <div className="log">
        {log.map((e, i) => <p key={i}>→ {e}</p>)}
      </div>
    </div>
  );
}`,
    steps:["Use camelCase event names: onClick, onChange, onSubmit","Pass function references, not invocations: onClick={fn}","Use arrow functions to pass arguments: onClick={() => fn(id)}","Access event object as a parameter: (e) => e.target.value","Call e.preventDefault() for forms/links","Call e.stopPropagation() to prevent event bubbling"],
    mistakes:["Calling the function immediately: `onClick={handleClick()}` runs on render","Forgetting e.preventDefault() on form submissions","Not understanding event bubbling and propagation","Creating new function instances in tight list loops (performance)"],
    qa:[

    explanation:`Hooks let you use state and other React features in functional components. Introduced in React 16.8.\n\n<strong>Rules of Hooks:</strong>\n1. Only call hooks at the top level (not inside loops, conditions, nested functions)\n2. Only call hooks from React functional components or custom hooks\n\n<strong>Core Hooks:</strong>\n• useState — local component state\n• useEffect — side effects (fetching, DOM ops)\n• useContext — consume context values\n• useRef — mutable ref, DOM access\n• useMemo — memoize expensive calculations\n• useCallback — memoize functions`,
    codeExample:`import React, { useState, useEffect, useRef, useMemo, useCallback } from 'react';

function HooksDemo() {
  const [count, setCount] = useState(0);
  const [query, setQuery] = useState('');

  // useRef — doesn't cause re-render

  const renderCount = useRef(0);

  // useEffect — runs after render

    document.title = \`Count: \${count}\`;
    return () => { document.title = 'React App'; }; // cleanup

    setCount(c => c + 1);

    codeExample:`import React, { useState } from 'react';

function useForm(initialValues, validate) {
  const [values, setValues] = useState(initialValues);
  const [errors, setErrors] = useState({});
  const [touched, setTouched] = useState({});

  const handleChange = (e) => {
    const { name, value } = e.target;
    setValues(prev => ({ ...prev, [name]: value }));
    if (touched[name]) {
      setErrors(validate({ ...values, [name]: value }));
    }
  };

  const handleBlur = (e) => {
    setTouched(prev => ({ ...prev, [e.target.name]: true }));
    setErrors(validate(values));
  };

  const handleSubmit = (onSubmit) => (e) => {
    e.preventDefault();
    const errs = validate(values);
    setErrors(errs);
    setTouched(Object.keys(values).reduce((a,k) => ({...a,[k]:true}), {}));
    if (Object.keys(errs).length === 0) onSubmit(values);
  };

  return { values, errors, touched, handleChange, handleBlur, handleSubmit };
}

function validate(values) {
  const errors = {};
  if (!values.email) errors.email = 'Email required';
  else if (!/\\S+@\\S+\\.\\S+/.test(values.email))
    errors.email = 'Invalid email format';
  if (!values.password) errors.password = 'Password required';
  else if (values.password.length < 8)
    errors.password = 'Minimum 8 characters';
  return errors;
}

function LoginForm() {
  const [done, setDone] = useState(false);
  const { values, errors, touched, handleChange, handleBlur, handleSubmit }
    = useForm({ email: '', password: '' }, validate);

  if (done) return <p>✅ Logged in!</p>;

  return (

          value={values.email}
          onChange={handleChange} onBlur={handleBlur}
          placeholder="Email address"

      </div>

          value={values.password}
          onChange={handleChange} onBlur={handleBlur}
          placeholder="Password"

        {touched.password && errors.password &&
          <span className="err">{errors.password}</span>}
      </div>

    explanation:`React applications commonly fetch data from APIs. Best practices:\n\n• Always show loading state\n• Always handle errors gracefully\n• Cancel requests on component unmount (AbortController)\n• Never make async the useEffect callback directly\n• Consider React Query or SWR for complex data fetching needs\n\n<strong>Common Patterns:</strong> useFetch custom hook, loading/error/data states, pagination, optimistic updates`,
    codeExample:`import React, { useState, useEffect } from 'react';

// Custom useFetch hook — reusable!
function useFetch(url) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    const controller = new AbortController();

    const fetchData = async () => {
      setLoading(true);
      setError(null);
      try {
        const res = await fetch(url, { signal: controller.signal });
        if (!res.ok) throw new Error(\`HTTP \${res.status}\`);
        const json = await res.json();
        setData(json);
      } catch (err) {
        if (err.name !== 'AbortError') setError(err.message);
      } finally {
        setLoading(false);
      }
    };

    fetchData();
    return () => controller.abort(); // Cancel on unmount
  }, [url]);

  return { data, loading, error };
}

function PostsList() {
  const [page, setPage] = useState(1);
  const url = \`https://jsonplaceholder.typicode.com/posts?_page=\${page}&_limit=5\`;
  const { data: posts, loading, error } = useFetch(url);

  if (loading) return <div className="spinner" />;

  if (error) return (
    <div className="error">
      <p>❌ {error}</p>
      <button onClick={() => setPage(1)}>Retry</button>
    </div>
  );

  return (
    <div>
      {posts?.map(post => (
        <div key={post.id} className="post-card">
          <small>#{post.id}</small>
          <h3>{post.title}</h3>
          <p>{post.body.substring(0, 100)}...</p>
        </div>
      ))}
      <div className="pagination">
        <button onClick={() => setPage(p => p-1)} disabled={page===1}>← Prev</button>
        <span>Page {page}</span>
        <button onClick={() => setPage(p => p+1)}>Next →</button>
      </div>
    </div>
  );
}`,

    codeExample:`// === Context API ===
import React, { createContext, useContext, useState } from 'react';

const ThemeContext = createContext(null);

function ThemeProvider({ children }) {
  const [theme, setTheme] = useState('light');
  const toggleTheme = () => setTheme(t => t === 'light' ? 'dark' : 'light');

  return (
    <ThemeContext.Provider value={{ theme, toggleTheme }}>
      {children}
    </ThemeContext.Provider>
  );
}

// Custom hook — clean abstraction
const useTheme = () => {
  const ctx = useContext(ThemeContext);
  if (!ctx) throw new Error('useTheme must be inside ThemeProvider');
  return ctx;
};

// Use anywhere in the tree!
function Header() {
  const { theme, toggleTheme } = useTheme();
  return (
    <button onClick={toggleTheme}>
      {theme === 'light' ? '🌙 Dark' : '☀️ Light'}
    </button>
  );
}

// === useReducer for complex state ===
const cartReducer = (state, action) => {
  switch (action.type) {
    case 'ADD_ITEM':
      const exists = state.find(i => i.id === action.item.id);
      if (exists) return state.map(i =>
        i.id === action.item.id ? {...i, qty: i.qty + 1} : i
      );
      return [...state, { ...action.item, qty: 1 }];

    case 'REMOVE_ITEM':
      return state.filter(i => i.id !== action.id);

    case 'CLEAR':
      return [];

    default:
      return state;
  }
};

function CartApp() {
  const [cart, dispatch] = useReducer(cartReducer, []);

  return (
    <div>
      <button onClick={() => dispatch({
        type: 'ADD_ITEM', item: { id: 1, name: 'Widget', price: 9.99 }
      })}>Add Widget</button>
      <button onClick={() => dispatch({ type: 'CLEAR' })}>Clear</button>
      <p>Items: {cart.length}</p>
    </div>
  );
}`,

// services/api.js — Axios instance with interceptors
import axios from 'axios';

const api = axios.create({
  baseURL: process.env.REACT_APP_API_URL,
  timeout: 10000,
});

api.interceptors.request.use(config => {
  const token = localStorage.getItem('token');
  if (token) config.headers.Authorization = \`Bearer \${token}\`;
  return config;
});

api.interceptors.response.use(
  res => res.data,
  err => {
    if (err.response?.status === 401) window.location.href = '/login';
    return Promise.reject(err);
  }
);

export default api;

// services/userService.js
export const userService = {
  getAll: () => api.get('/users'),
  getById: id => api.get(\`/users/\${id}\`),
  create: data => api.post('/users', data),
  update: (id, data) => api.put(\`/users/\${id}\`, data),
  delete: id => api.delete(\`/users/\${id}\`),
};`,

let apiState = {
  tab: 'posts',
  posts: null, users: null,
  loading: false, error: null,
  page: 1, searchId: ''
};

function renderAPIPage() {
  const tabs = [
    { id:'posts', label:'📄 Posts' },
    { id:'users', label:'👥 Users' },
    { id:'todos', label:'✅ Todos' },
  ];

  document.getElementById('page-content').innerHTML = `
    <div class="api-page page-fade">
      <h2>🌐 API Live Demo</h2>
      <p>Live data fetched from <strong>JSONPlaceholder</strong> — a free REST API for testing. This demonstrates loading states, error handling, and pagination.</p>

      <div class="tab-bar" style="margin-bottom:20px">
        ${tabs.map(t => `
          <button class="tab-btn ${apiState.tab === t.id ? 'active' : ''}"
            onclick="switchAPITab('${t.id}')">
            ${t.label}
          </button>
        `).join('')}
      </div>

      <div id="api-controls-area">
        ${renderAPIControls()}
      </div>
      <div id="api-data-area">
        ${renderAPIData()}
      </div>
    </div>
  `;

  if (!apiState[apiState.tab]) {
    fetchAPIData();
  }
}

function renderAPIControls() {
  if (apiState.tab === 'posts') {
    return `
      <div class="api-controls">
        <input type="number" id="search-id" min="1" max="100"
          placeholder="Search post by ID (1-100)"
          value="${apiState.searchId}"
          oninput="apiState.searchId=this.value" />
        <button class="btn-fetch" onclick="fetchAPIData()">🔍 Fetch</button>
        <button class="btn-secondary" style="padding:8px 14px;font-size:0.875rem"
          onclick="apiState.searchId='';apiState.page=1;fetchAPIData()">Reset</button>
      </div>
    `;
  }
  return `<div class="api-controls">
    <button class="btn-fetch" onclick="fetchAPIData()">🔄 Reload</button>
  </div>`;
}

function renderAPIData() {
  if (apiState.loading) {
    return `<div class="loading-state"><div class="spinner"></div><p>Fetching from JSONPlaceholder API…</p></div>`;
  }
  if (apiState.error) {
    return `<div class="error-state"><p>❌ ${apiState.error}</p><button onclick="fetchAPIData()">Try Again</button></div>`;
  }
  if (!apiState[apiState.tab]) {
    return `<div class="loading-state"><div class="spinner"></div><p>Loading…</p></div>`;
  }

  if (apiState.tab === 'posts') {
    const data = apiState.posts || [];
    const posts = Array.isArray(data) ? data : [data];
    return `
      <div class="posts-grid">
        ${posts.map(p => `
          <div class="post-card">
            <span class="post-id">POST #${p.id} · USER #${p.userId}</span>
            <h4>${p.title}</h4>
            <p>${p.body.substring(0, 120)}…</p>
          </div>
        `).join('')}
      </div>
      ${!apiState.searchId ? `
        <div class="pagination">
          <button onclick="apiPage(-1)" ${apiState.page <= 1 ? 'disabled' : ''}>← Previous</button>
          <span>Page ${apiState.page} of 20</span>
          <button onclick="apiPage(1)" ${apiState.page >= 20 ? 'disabled' : ''}>Next →</button>
        </div>
      ` : ''}
    `;
  }

  if (apiState.tab === 'users') {
    const users = apiState.users || [];
    return `
      <div class="users-table-wrap">
        <table class="users-table">
          <thead>
            <tr>
              <th>Name</th><th>Username</th><th>Email</th><th>City</th><th>Company</th>
            </tr>
          </thead>
          <tbody>
            ${users.map(u => `
              <tr>
                <td>
                  <div class="user-name-cell">
                    <div class="user-avatar">${u.name[0]}</div>
                    ${u.name}
                  </div>
                </td>
                <td>@${u.username}</td>
                <td>${u.email}</td>
                <td>${u.address.city}</td>
                <td>${u.company.name}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  if (apiState.tab === 'todos') {
    const todos = apiState.todos || [];
    return `
      <div class="posts-grid">
        ${todos.slice(0, 12).map(todo => `
          <div class="post-card" style="cursor:default">
            <span class="post-id" style="color:${todo.completed ? 'var(--accent2)' : 'var(--text3)'}">
              ${todo.completed ? '✅ Completed' : '⏳ Pending'} · User #${todo.userId}
            </span>
            <h4 style="text-decoration:${todo.completed ? 'line-through' : 'none'};opacity:${todo.completed ? 0.6 : 1}">
              ${todo.title}
            </h4>
          </div>
        `).join('')}
      </div>
    `;
  }
  return '';
}

function switchAPITab(tab) {
  apiState.tab = tab;
  apiState.loading = false;
  apiState.error = null;
  renderAPIPage();
  if (!apiState[tab]) fetchAPIData();
}

function apiPage(dir) {
  apiState.page = Math.max(1, Math.min(20, apiState.page + dir));
  fetchAPIData();
}

async function fetchAPIData() {
  apiState.loading = true;
  apiState.error = null;
  document.getElementById('api-data-area').innerHTML = renderAPIData();

  try {
    let url = '';
    if (apiState.tab === 'posts') {
      if (apiState.searchId) {
        url = `https://jsonplaceholder.typicode.com/posts/${apiState.searchId}`;
      } else {
        url = `https://jsonplaceholder.typicode.com/posts?_page=${apiState.page}&_limit=9`;
      }
    } else if (apiState.tab === 'users') {
      url = 'https://jsonplaceholder.typicode.com/users';
    } else {
      url = 'https://jsonplaceholder.typicode.com/todos?_limit=12';
    }

    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
    const data = await res.json();

    if (apiState.tab === 'posts') apiState.posts = data;
    else if (apiState.tab === 'users') apiState.users = data;
    else apiState.todos = data;

    apiState.loading = false;
    apiState.error = null;
  } catch (err) {
    apiState.loading = false;
    apiState.error = err.message;
  }

  document.getElementById('api-controls-area').innerHTML = renderAPIControls();
  document.getElementById('api-data-area').innerHTML = renderAPIData();
}

        `).join('')}
        <span class="task-count">${filtered.length} task${filtered.length!==1?'s':''}</span>
      </div>

      <!-- Kanban Columns -->
      <div class="task-columns">
        ${cols.map(col => {
          const colTasks = filtered.filter(t => t.status === col.key);
          return `
            <div class="task-col">
              <div class="task-col-header">
                <div class="col-dot ${col.dotClass}"></div>
                <h4>${col.label}</h4>
                <div class="col-count">${colTasks.length}</div>
              </div>
              ${colTasks.length === 0 ? `<div class="empty-col">No tasks here</div>` : ''}
              ${colTasks.map(task => `
                <div class="task-card">
                  <h5>${escapeHtml(task.title)}</h5>
                  ${task.description ? `<p>${escapeHtml(task.description)}</p>` : ''}
                  <div class="task-card-footer">
                    <span class="priority-badge ${task.priority}">${task.priority}</span>
                    <div class="task-card-actions">
                      <button class="icon-btn" title="Edit" onclick="editTask('${task.id}')">✏️</button>
                      <button class="icon-btn" title="Move" onclick="cycleStatus('${task.id}')">🔄</button>
                      <button class="icon-btn delete" title="Delete" onclick="deleteTask('${task.id}')">🗑️</button>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `;
}

function saveTask() {
  const title = document.getElementById('task-title').value.trim();
  if (!title) { showToast('⚠️ Title is required!'); return; }

  if (editingTaskId) {
    tasks = tasks.map(t => t.id === editingTaskId
      ? { ...t, title: taskForm.title, description: taskForm.description,
          priority: taskForm.priority, status: taskForm.status }
      : t
    );
    showToast('✅ Task updated!');
    editingTaskId = null;
  } else {
    tasks.push({
      id: 't' + Date.now(),
      title: taskForm.title,
      description: taskForm.description,
      priority: taskForm.priority,
      status: taskForm.status,
      created: Date.now()
    });
    showToast('✅ Task added!');
  }

  taskForm = { title:'', description:'', priority:'medium', status:'todo' };
  saveTasks();
  renderTaskPage();
}

function editTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  editingTaskId = id;
  taskForm = { title: task.title, description: task.description,
    priority: task.priority, status: task.status };
  renderTaskPage();
  window.scrollTo(0, 0);
}

function cancelEdit() {
  editingTaskId = null;
  taskForm = { title:'', description:'', priority:'medium', status:'todo' };
  renderTaskPage();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  showToast('🗑️ Task deleted');
  renderTaskPage();
}

function cycleStatus(id) {
  const cycle = { 'todo': 'in-progress', 'in-progress': 'done', 'done': 'todo' };
  tasks = tasks.map(t => t.id === id ? { ...t, status: cycle[t.status] } : t);
  saveTasks();
  showToast('🔄 Status updated');
  renderTaskPage();
}

function setTaskFilter(f) {
  taskFilter = f;
  renderTaskPage();
}

// ============================================================
// SEARCH PAGE
// ============================================================
let searchQuery = '';

function handleSearch(val) {
  searchQuery = val;
  if (!val.trim()) {
    currentPage = 'home';
    render();
    return;
  }
  currentPage = 'search';
  renderSearchPage();
  updateSidebar();
}

function renderSearchPage() {
  const q = searchQuery.toLowerCase();
  const results = topics.filter(t =>
    t.title.toLowerCase().includes(q) ||
    t.description.toLowerCase().includes(q) ||
    t.explanation.toLowerCase().includes(q) ||
    t.codeExample.toLowerCase().includes(q) ||
    t.qa.some(item => item.q.toLowerCase().includes(q) || item.a.toLowerCase().includes(q))
  );

  document.getElementById('page-content').innerHTML = `
    <div class="search-results page-fade">
      <h2>🔍 "${searchQuery}" — ${results.length} result${results.length !== 1 ? 's' : ''}</h2>
      ${results.length === 0 ? `<p style="color:var(--text2)">No topics match your search. Try different keywords.</p>` : ''}
      ${results.map(t => `
        <div class="search-result-item" onclick="showTopic('${t.id}')">
          <div class="ri">${t.icon}</div>
          <div>
            <h4>${t.title}</h4>
            <p>${t.description}</p>
          </div>
          <span class="meta-tag cat" style="margin-left:auto;flex-shrink:0">${t.category}</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ============================================================
// NAVIGATION
// ============================================================
function showPage(page) {
  currentPage = page;
  currentTopic = null;
  document.getElementById('search-input').value = '';
  searchQuery = '';
  render();
}

function showTopic(id) {
  currentPage = 'topic';
  currentTopic = id;
  currentTab = 'explanation';
  document.getElementById('search-input').value = '';
  searchQuery = '';
  document.getElementById('main').scrollTop = 0;
  render();
}

function switchTab(tab) {
  currentTab = tab;
  renderTopicPage();
}

function toggleComplete(id) {
  if (completedTopics.has(id)) completedTopics.delete(id);
  else completedTopics.add(id);
  saveCompleted();
  showToast(completedTopics.has(id) ? '🎉 Topic marked complete!' : 'Unmarked');
  render();
}

function toggleQA(index) {
  const item = document.getElementById(`qa-${index}`);
  item.classList.toggle('open');
}

// ============================================================
// THEME
// ============================================================
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light', !isDark);
  document.getElementById('theme-btn').textContent = isDark ? '🌙 Dark' : '☀️ Light';
}

// ============================================================
// UTILITIES
// ============================================================
function escapeHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatExplanation(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.*?)`/g, '<code style="background:var(--bg4);padding:2px 6px;border-radius:4px;font-family:DM Mono,monospace;font-size:0.85em">$1</code>')
    .replace(/\n/g, '<br>');
}

function copyCode(btn) {
  const code = btn.closest('.code-block').querySelector('pre').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    btn.style.background = 'var(--accent2)';
    btn.style.color = 'white';
    setTimeout(() => { btn.textContent = 'Copy'; btn.style.background = ''; btn.style.color = ''; }, 2000);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => { t.style.display = 'none'; }, 2500);
}

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
